name: New GitHub Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    name: New GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create a GitHub Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          draft: false
